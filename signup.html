<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | PartyPop Celebrations</title>
    <meta name="description" content="Create a PartyPop Celebrations account to easily request and manage custom balloon decorations and event styling packages.">
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.05) 0%, rgba(108, 92, 231, 0.05) 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 3rem;
            transform: translateY(0);
            transition: all 0.5s ease;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.1);
        }

        .auth-card:hover {
            transform: translateY(-5px);
            border-color: var(--puppet-accent);
        }

        .social-btn {
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: inherit;
            border-radius: 12px;
            padding: 12px 24px;
            width: 100%;
            display: grid;
            grid-template-columns: 20px 1fr 20px;
            align-items: center;
            text-align: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-bottom: 0.8rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--puppet-accent);
            color: var(--puppet-accent);
        }

        .auth-logo {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .auth-card a {
            transition: all 0.3s ease;
        }
        .auth-card a:hover {
            color: var(--primary) !important;
            text-decoration: underline !important;
        }

        .theme-switch-wrapper {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        @media (max-width: 576px) {
            .theme-switch-wrapper {
                top: 1rem;
                right: 1rem;
            }
            .social-btn {
                padding: 12px 16px;
                min-height: 68px;
            }
        }
    </style>
</head>

<body class="loading">
    <div class="curtain-container">
        <div class="curtain-side curtain-left"></div>
        <div class="curtain-side curtain-right"></div>
    </div>

    <!-- Theme & RTL Switcher (Fixed) -->
    <div class="theme-switch-wrapper d-flex align-items-center gap-3">
        <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="rtl-toggle">
            <label class="form-check-label small" for="rtl-toggle">RTL</label>
        </div>
        <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="theme-toggle">
            <label class="form-check-label small" for="theme-toggle">
                <i class="bi bi-moon-stars"></i>
            </label>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card reveal">
            <div class="auth-logo text-center">
                <a href="index.html" class="d-inline-block">
                    <img src="assets/images/logo.svg" alt="PartyPop Celebrations" style="max-height: 48px;">
                </a>
            </div>

            <h2 class="h4 fw-bold text-center mb-4">Create Your Account</h2>

            <form action="login.html">
                <div class="mb-3">
                    <label class="form-label small" for="full-name">Full Name</label>
                    <input type="text" class="form-control form-control-puppet" id="full-name" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small" for="email">Email Address</label>
                    <input type="email" class="form-control form-control-puppet" id="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small" for="password">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control form-control-puppet pe-5" id="password" required>
                        <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted pe-3 text-decoration-none" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small" for="confirm-password">Confirm Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control form-control-puppet pe-5" id="confirm-password" required>
                        <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted pe-3 text-decoration-none" id="toggleConfirmPassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small text-muted" for="terms">
                        I agree to the <a href="#" class="text-primary text-decoration-none">Terms & Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary-pop w-100 py-3">
                    Create Account
                </button>
            </form>

            <div class="divider text-muted small text-center my-4">OR SIGN UP WITH</div>

            <a href="#" class="social-btn">
                <i class="bi bi-google text-danger"></i> <span>Continue with Google</span> <span></span>
            </a>
            <a href="#" class="social-btn">
                <i class="bi bi-facebook text-primary"></i> <span>Continue with Facebook</span> <span></span>
            </a>
            <a href="#" class="social-btn">
                <i class="bi bi-apple"></i> <span>Continue with Apple</span> <span></span>
            </a>

            <p class="text-center small text-muted mt-4 mb-0">
                Already have an account?
                <a href="login.html" class="text-primary text-decoration-none fw-semibold">Log In</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('togglePassword')?.addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        document.getElementById('toggleConfirmPassword')?.addEventListener('click', function () {
            const confirmPasswordInput = document.getElementById('confirm-password');
            const icon = this.querySelector('i');
            if (confirmPasswordInput.type === 'password') {
                confirmPasswordInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                confirmPasswordInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });
    </script>
</body>

</html>
