<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | PartyPop Celebrations</title>
    <meta name="description" content="The celebration is brewing! PartyPop Celebrations is launching soon with premium balloon arrangements, party packages, and design consultations.">
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .soon-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.05) 0%, rgba(108, 92, 231, 0.05) 100%);
        }

        .soon-content {
            max-width: 600px;
            z-index: 10;
        }

        .floating-balloons-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
    </style>
</head>

<body class="loading">
    <div class="curtain-container">
        <div class="curtain-side curtain-left"></div>
        <div class="curtain-side curtain-right"></div>
    </div>

    <!-- Theme & RTL Switcher (Fixed) -->
    <div class="theme-switch-wrapper d-flex align-items-center gap-3" style="position: fixed; top: 2rem; right: 2rem; z-index: 1000;">
        <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="rtl-toggle">
            <label class="form-check-label small" for="rtl-toggle">RTL</label>
        </div>
        <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="theme-toggle">
            <label class="form-check-label small" for="theme-toggle">
                <i class="bi bi-moon-stars"></i>
            </label>
        </div>
    </div>

    <div class="soon-container">
        <!-- Floating balloons generated by JS -->
        <div class="floating-balloons-container"></div>
        
        <div class="soon-content reveal">
            <a href="index.html" class="d-inline-block mb-4">
                <img src="assets/images/logo.svg" alt="PartyPop Celebrations" style="max-height: 60px;">
            </a>
            <h1 class="display-3 fw-bold text-white mb-3">The Celebration is Brewing!</h1>
            <p class="lead text-muted mb-5">We are preparing our brand new premium balloon templates, event packages, and custom props. Stay tuned for our grand launch!</p>
            
            <div id="countdown" class="d-flex justify-content-center gap-3 mb-5">
                <!-- Countdown generated by JS -->
            </div>

            <form class="d-flex flex-column flex-sm-row justify-content-center gap-3 mx-auto" style="max-width: 500px;" onsubmit="alert('Thank you! We will notify you when we launch.'); return false;">
                <input type="email" class="form-control form-control-puppet rounded-pill px-4 text-white" placeholder="Enter your email address..." required>
                <button type="submit" class="btn btn-primary-pop px-5 py-3">Notify Me</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
