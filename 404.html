<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | PartyPop Celebrations</title>
    <meta name="description" content="Oops! The page you are looking for has floated away. Return to PartyPop Celebrations homepage.">
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.05) 0%, rgba(108, 92, 231, 0.05) 100%);
        }

        .error-content {
            max-width: 600px;
            z-index: 10;
        }

        .popped-balloon {
            font-size: 6rem;
            animation: bounce 2s infinite ease-in-out;
            color: var(--puppet-accent);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>

<body class="loading">
    <div class="curtain-container">
        <div class="curtain-side curtain-left"></div>
        <div class="curtain-side curtain-right"></div>
    </div>

    <!-- Theme & RTL Switcher (Fixed) -->
    <div class="theme-switch-wrapper d-flex align-items-center gap-3" style="position: fixed; top: 2rem; right: 2rem; z-index: 1000;">
        <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="rtl-toggle">
            <label class="form-check-label small" for="rtl-toggle">RTL</label>
        </div>
        <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="theme-toggle">
            <label class="form-check-label small" for="theme-toggle">
                <i class="bi bi-moon-stars"></i>
            </label>
        </div>
    </div>

    <div class="error-container">
        <div class="error-content reveal">
            <div class="popped-balloon mb-4">
                <i class="bi bi-balloon-fill"></i>
            </div>
            <h1 class="display-1 fw-bold text-white mb-3">404</h1>
            <h2 class="h3 mb-4">Oops! The Balloon Popped!</h2>
            <p class="text-muted mb-5">The page you are looking for has floated away, popped, or never existed. Let's get you back to the celebration.</p>
            <a href="index.html" class="btn btn-primary-pop px-5 py-3">Fly Back Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
